spring.application.name=db2-performance

# --- Active profile (override with -Dspring.profiles.active=prod) -------------
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- DB2 datasource (HikariCP is auto-configured from these) -----------------
spring.datasource.url=${DB_URL:jdbc:db2://localhost:50000/SAMPLE}
spring.datasource.username=${DB_USER:db2inst1}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.ibm.db2.jcc.DB2Driver
spring.datasource.hikari.pool-name=db2-performance-pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- Application context (DB2 target + CORS) ---------------------------------
app.db2.subsystem=${DB2_SUBSYSTEM:XDB2I}
app.db2.collection=${DB2_COLLECTION:XDB2I}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# --- UI defaults surfaced through /api/config/settings -----------------------
app.ui.default-interval-hours=24
app.ui.items-per-page=50
app.ui.stats-warning-threshold-days=30

# --- Actuator ----------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# --- Server ------------------------------------------------------------------
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=application/json
