# --- Production profile ------------------------------------------------------
logging.level.root=WARN
logging.level.com.euro.db2performance=INFO

# Larger pool for production workload
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}

# DB2 SSL - point these at your TLS trust store when enabling encryption
spring.datasource.url=${DB_URL}
spring.datasource.hikari.data-source-properties.sslConnection=${DB2_SSL:true}
spring.datasource.hikari.data-source-properties.sslTrustStoreLocation=${DB2_TRUSTSTORE:}
spring.datasource.hikari.data-source-properties.sslTrustStorePassword=${DB2_TRUSTSTORE_PASSWORD:}

# Tighten CORS to the real frontend origin in prod
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Serve behind TLS terminator/ingress - HTTPS is expected upstream
server.port=${SERVER_PORT:8080}
